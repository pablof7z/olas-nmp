name: Olas
options:
  bundleIdPrefix: io.f7z
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 456SHKPP26
packages:
  FlatBuffers:
    url: https://github.com/google/flatbuffers.git
    from: 25.12.19
targets:
  Olas:
    type: application
    platform: iOS
    sources:
      - path: Olas
      - path: Components
    dependencies:
      - package: FlatBuffers
    info:
      path: Olas/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        CFBundleDisplayName: Olas
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "2"
        CFBundleIconName: AppIcon
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSupportsIndirectInputEvents: true
        LSApplicationQueriesSchemes:
          - nostrsigner
          - primal
          - nostrconnect
        CFBundleURLTypes:
          - CFBundleURLName: io.f7z.olas.nip46
            CFBundleURLSchemes:
              - olas
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pablof7z.snapstr
        PRODUCT_MODULE_NAME: Olas
        PRODUCT_NAME: Olas
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Olas/Olas.entitlements
        GENERATE_INFOPLIST_FILE: NO
        # RUST_TARGET defaults by SDK so plain Xcode GUI builds resolve the static
        # lib path without needing a command-line override. `just` still passes
        # RUST_TARGET explicitly, which takes precedence.
        RUST_TARGET: aarch64-apple-ios
        "RUST_TARGET[sdk=iphoneos*]": aarch64-apple-ios
        "RUST_TARGET[sdk=iphonesimulator*]": aarch64-apple-ios-sim
        OTHER_LDFLAGS: "$(inherited) $(SRCROOT)/../../target/$(RUST_TARGET)/$(RUST_BUILD_PROFILE)/libnmp_app_olas.a -lc++"
        LIBRARY_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../../target/$(RUST_TARGET)/$(RUST_BUILD_PROFILE)"
        SWIFT_INCLUDE_PATHS: "$(inherited) $(SRCROOT)/Olas/Bridge"
        SWIFT_OBJC_BRIDGING_HEADER: ""
      configs:
        Debug:
          RUST_BUILD_PROFILE: debug
        Release:
          RUST_BUILD_PROFILE: release
  OlasTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OlasTests
    dependencies:
      - target: Olas
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.olas.tests
  OlasUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OlasUITests
    dependencies:
      - target: Olas
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.olas.uitests
